<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Çevrimdışı - Expense Share</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .container {
        text-align: center;
        background: white;
        padding: 3rem 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      h1 {
        color: #1f2937;
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #6b7280;
        margin-bottom: 1.5rem;
      }
      button {
        background: #16a34a;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #15803d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Çevrimdışısın</h1>
      <p>İnternet bağlantısı yok. Bağlantı gelince tekrar dene.</p>
      <button onclick="location.reload()">Tekrar Dene</button>
    </div>
  </body>
</html>
